<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Business | Professional Services</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        /* Optional: Add some padding to sections so the sticky nav doesn't overlap titles */
        section {
            scroll-margin-top: 70px; /* Adjust this based on your nav height */
        }
        nav ul li a:hover {
            color: #3498db;
            border-bottom: 2px solid #3498db;
            transition: 0.3s;
        }
        #backToTop {
            display: none; /* Hidden by default */
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            border: none;
            outline: none;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            padding: 15px;
            border-radius: 50%; /* Makes it a circle */
            font-size: 18px;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

            #backToTop:hover {
                background-color: #2980b9;
                transform: scale(1.1);
            }
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
        }

        /* Footer Styles */
        footer {
            background: #2c3e50;
            color: white;
            padding: 40px 5% 20px;
            text-align: center;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
            text-align: left;
        }

        .footer-section {
            flex: 1;
            margin: 10px;
            min-width: 200px;
        }

            .footer-section h4 {
                border-bottom: 2px solid #3498db;
                padding-bottom: 10px;
                margin-bottom: 15px;
            }

        .social-links a {
            color: white;
            font-size: 1.5rem;
            margin-right: 15px;
            transition: 0.3s;
        }

            .social-links a:hover {
                color: #3498db;
            }

        .copyright {
            margin-top: 30px;
            border-top: 1px solid #3e4f5f;
            padding-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
            width: 100%;
            text-align: center;
        }
        /* Navigation */
        nav {
            background: #2c3e50;
            color: #fff;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

            nav .logo {
                font-size: 1.5rem;
                font-weight: bold;
            }

            nav ul {
                list-style: none;
                display: flex;
            }

                nav ul li {
                    margin-left: 20px;
                }

                    nav ul li a {
                        color: #fff;
                        text-decoration: none;
                    }

        /* Hero Section */
        .hero {
            background: #34495e;
            color: white;
            padding: 100px 5%;
            text-align: center;
        }

            .hero h1 {
                font-size: 3rem;
                margin-bottom: 10px;
            }

            .hero p {
                font-size: 1.2rem;
                opacity: 0.9;
            }

        /* Services Section */
        .services {
            padding: 50px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            background: #f4f4f4;
        }

        .service-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Contact Section */
        .contact {
            padding: 50px 5%;
            text-align: center;
        }

        form {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background: #27ae60;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

            button:hover {
                background: #2ecc71;
            }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            nav ul {
                display: none;
            }
            /* Simplified for this example */
        }
        /* New styling for images and icons */
        .service-card i {
            font-size: 2.5rem;
            color: #3498db;
            margin-bottom: 15px;
        }

        .service-card img {
            width: 100%;
            height: 150px;
            object-fit: cover; /* Keeps images from stretching */
            border-radius: 4px;
            margin-bottom: 15px;
        }

        /* Add a subtle lift effect when hovering over a card */
        .service-card:hover {
            transform: translateY(-10px);
            transition: 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">怡氢泉为您的健康保驾护航</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <h1>欢迎来到怡氢泉</h1>
        <p>我们为您提供最先进贴心的氢健康产品和服务.</p>
    </section>

    <section class="services" id="services">
        <div class="service-card">
            <img src="waterbanner.png?q=80&w=600&auto=forma" alt="水素生活富氢水">
            <i class="fas fa-tint"></i>
            <h3>水素生活富氢水</h3>
            <p>高浓度富氢水，助力身体抗氧化，焕发活力。</p>
        </div>

        <div class="service-card">
            <img src="https://images.unsplash.com/photo-1515377905703-c4788e51af15?q=80&w=600&auto=format&fit=crop" alt="全家氢浴系列">
            <i class="fas fa-bath"></i>
            <h3>全家氢浴系列</h3>
            <p>提供家用及商用高效氢浴机，全方位呵护皮肤健康。</p>
        </div>

        <div class="service-card">
            <img src="https://images.unsplash.com/photo-1628352081506-83c43123ed6d?q=80&w=600&auto=format&fit=crop" alt="氢农业设备">
            <i class="fas fa-leaf"></i>
            <h3>氢农业设备</h3>
            <p>利用氢水技术提升农作物产量与品质，开启绿色农业。</p>
        </div>
    </section>
    <section class="contact" id="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="How can we help?" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
    <button id="backToTop" title="Go to top">
        <i class="fas fa-arrow-up"></i>
    </button>
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h4>关于 怡氢泉</h4>
                <p>专注于氢健康领域，为您提供最优质的氢水及氢浴解决方案。</p>
            </div>
            <div class="footer-section">
                <h4>联系方式</h4>
                <p><i class="fas fa-map-marker-alt"></i> 中国上海市闵行区兴梅路579弄B1栋601室</p>
                <p><i class="fas fa-phone"></i> +86 （021）6486-1355</p>
            </div>
            <div class="footer-section">
                <h4>关注我们</h4>
                <div class="social-links">
                    <a href="#"><i class="fab fa-weixin"></i></a>
                    <a href="#"><i class="fab fa-weibo"></i></a>
                    <a href="#"><i class="fas fa-envelope"></i></a>
                </div>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 怡氢泉 版权所有.
        </div>
    </footer>
    <script>
        // 1. Select the form element from the document
        const contactForm = document.querySelector('form');
        const contactSection = document.getElementById('contact');

        // 2. Add an "EventListener" to listen for when the user clicks 'Send'
        contactForm.addEventListener('submit', function (event) {
            // Prevent the page from reloading
            event.preventDefault();

            // Get the user's name from the input field
            const userName = contactForm.querySelector('input[type="text"]').value;

            // 3. Create a success message
            const successMessage = `
                <div style="background: #e8f5e9; padding: 20px; border-radius: 8px; border: 1px solid #27ae60;">
                    <h2 style="color: #27ae60;">感谢您的咨询, ${userName}!</h2>
                    <p>我们已经收到您的信息，怡氢泉的专业团队会尽快为您回复。</p>
                    <button onclick="location.reload()" style="background: #2c3e50; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">
                        返回
                    </button>
                </div>
            `;

            // 4. Replace the form content with the success message
            contactSection.innerHTML = successMessage;
        });
        // Get the button
        const topBtn = document.getElementById("backToTop");

        // When the user scrolls down 300px from the top, show the button
        window.onscroll = function () {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                topBtn.style.display = "block";
            } else {
                topBtn.style.display = "none";
            }
        };

        // When the user clicks the button, scroll to the top
        topBtn.addEventListener("click", function () {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    </script>
</body>
</html>
